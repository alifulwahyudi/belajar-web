<!doctype html>
<html>
  <head>
    <title>Table Materi</title>
  </head>
  <body>
    <!-- Table 1 -->
    <h2>Table Pertama</h2>
    <table border="1" cellspacing="0" cellpadding="5">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Umur</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Aliful</td>
          <td>17</td>
        </tr>
        <tr>
          <td>Budi</td>
          <td>22</td>
        </tr>
      </tbody>
    </table>

    <br />

    <!-- Table 2 -->
    <h2>Table Kedua</h2>
    <table border="1" cellspacing="0" cellpadding="5">
      <thead>
        <tr>
          <th>Mata Pelajaran</th>
          <th>Nilai</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Matematika</td>
          <td>90</td>
        </tr>
        <tr>
          <td>Bahasa Inggris</td>
          <td>85</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
