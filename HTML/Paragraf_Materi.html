<!doctype html>
<html>
  <head>
    <title>Materi Paragraf</title>
  </head>
  <body>
    <!-- Ini adalah contoh tag p, br, hr, u, dan i-->
    <p><i>Ini Paragraf Pertama</i></p>
    <br />
    <p><b>Ini Paragraf</b> <br />Kedua</p>
    <hr />
    <p><u>Ini Paragraf Ketiga</u></p>
    <br />
    <hr />

    <p>
      <!-- Ini adalah contoh tag strong dan em-->
      <strong>Perhatian.</strong> kalau mau serius sama dia,
      <em>luh harus serius. ALL IN</em>
    </p>
  </body>
</html>
