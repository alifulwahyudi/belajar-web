<!doctype html>
<html>
  <head>
    <title>Answer Materi Form</title>
  </head>
  <body>
    <form>
      <table border="1" cellspacing="0" cellpadding="5">
        <tr>
          <td><label for="username">Username:</label></td>
          <td><input type="text" id="username" /></td>
        </tr>
        <tr>
          <td><label for="password">Password:</label></td>
          <td><input type="password" id="password" /></td>
        </tr>
        <tr>
          <td colspan="2" rowspan="1">
            <input type="radio" id="pria" name="gender" /><label for="pria"
              >pria</label
            >
            <input type="radio" id="wanita" name="gender" /><label for="wanita"
              >wanita</label
            >
          </td>
        </tr>
        <tr>
          <td colspan="2" rowspan="1">
            <input type="checkbox" id="menyanyi" /><label for="menyanyi"
              >menyanyi</label
            >
            <input type="checkbox" id="olahraga" /><label for="olahraga"
              >olahraga</label
            >
            <input type="checkbox" id="membaca" /><label for="membaca"
              >membaca</label
            >
            <input type="checkbox" id="menonton-anime" /><label
              for="menonton-anime"
              >Menonton anime</label
            >
          </td>
        </tr>
        <tr>
          <td>Kota Kelahiran:</td>
          <td>
            <select>
              <option value="pilihan1">Jakarta</option>
              <option value="pilihan2">Yogyakarta</option>
              <option value="pilihan3">Surabaya</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Text Area:</td>
          <td>
            <textarea></textarea>
          </td>
        </tr>
        <tr>
          <td colspan="2" rowspan="1">
            <button type="submit">Kirim</button>
          </td>
        </tr>
      </table>
    </form>
  </body>
</html>
